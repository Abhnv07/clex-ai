<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Models — CLEX</title>
    <meta name="description" content="Browse AI models available through CLEX. Text, code, speech, safety, embedding, and vision models in one unified catalog." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="shared.css" />

    <link rel="icon" type="image/png" href="favicon.png" />
    <!-- Social Preview Tags -->
    <meta property="og:title" content="Models — CLEX" />
    <meta property="og:description" content="Browse AI models available through CLEX. Text, code, speech, safety, embedding, and vision models in one unified catalog." />
    <meta property="og:image" content="https://clex.in/preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Models — CLEX" />
    <meta name="twitter:description" content="Browse AI models available through CLEX. Text, code, speech, safety, embedding, and vision models in one unified catalog." />
    <meta name="twitter:image" content="https://clex.in/preview.png" />
</head>

  <body class="min-h-screen relative">
    <canvas id="particle-canvas"></canvas>

    <div class="relative z-10 flex flex-col min-h-screen">
      <div data-clex-header data-page="models"></div>

      <!-- Hero Banner -->
      <section class="pt-36 pb-12 max-w-[1400px] mx-auto w-full px-6 md:px-12 lg:px-16">
        <div class="flex flex-col md:flex-row items-start md:items-end justify-between gap-6 mb-10">
          <div>
            <p class="label-caps mb-4" id="model-count-badge" data-model-count-label>Models</p>
            <h1 class="text-4xl md:text-5xl text-white leading-tight display-serif breathe">
              Model <span class="display-serif-italic" style="color:#c9a96e">Catalog</span>
            </h1>
            <p class="text-[#888] text-lg mt-3 max-w-xl">
              Browse, search, and try every model available through the CLEX unified API.
            </p>
          </div>

          <!-- Search Bar -->
          <div class="w-full md:w-96 relative">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[#555]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input id="search-input" type="text" placeholder="Search models, publishers..." class="w-full bg-white/[0.03] border border-white/[0.06] rounded-xl pl-11 pr-4 py-3 text-sm text-white placeholder-[#555] outline-none focus:border-[#c9a96e]/30 transition-colors backdrop-blur-md" />
          </div>
        </div>

        <!-- Category Tabs -->
        <div class="flex flex-wrap gap-2" id="category-tabs">
          <button class="category-tab active" data-category="all">
            All Models
          </button>
          <button class="category-tab" data-category="text">
            Text & Chat
          </button>
          <button class="category-tab" data-category="code">
            Code Generation
          </button>
          <button class="category-tab" data-category="speech">
            Speech & Audio
          </button>
          <button class="category-tab" data-category="safety">
            Safety & Guardrails
          </button>
          <button class="category-tab" data-category="embedding">
            Embedding & Reranking
          </button>
          <button class="category-tab" data-category="vision">
            Vision & Multimodal
          </button>
        </div>
      </section>

      <!-- Models Grid -->
      <section class="flex-1 max-w-[1400px] mx-auto w-full px-6 md:px-12 lg:px-16 pb-20">
        <div id="models-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5" style="overflow:visible">
          <!-- Injected by JS -->
        </div>
        <div id="no-results" class="hidden text-center py-20">
          <p class="text-[#555] text-lg">No models found matching your search.</p>
        </div>
      </section>

      <div data-clex-footer></div>
    </div>

    <!-- Chat Panel Overlay -->
    <div
      id="chat-overlay"
      class="fixed inset-0 bg-black/50 z-[99] hidden"
      onclick="closeChat()"
    ></div>

    <!-- Chat Panel -->
    <div id="chat-panel" class="chat-panel z-[100]">
      <div class="flex items-center justify-between p-4 border-b border-white/[0.06] bg-[#050505]/90">
        <div class="flex items-center gap-3">
          <div class="w-1.5 h-1.5 rounded-full bg-[#c9a96e] shadow-[0_0_6px_rgba(201,169,110,0.5)]"></div>
          <div>
            <h3 id="chat-model-name" class="text-sm font-semibold text-white">Model</h3>
            <p id="chat-model-publisher" class="text-xs text-[#555]">Publisher</p>
          </div>
        </div>
        <button onclick="closeChat()" class="w-8 h-8 rounded-lg bg-white/[0.03] border border-white/[0.06] flex items-center justify-center text-[#555] hover:text-white hover:bg-white/[0.06] transition-all">
          <svg
            class="w-4 h-4"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
      <div id="chat-messages" class="chat-messages">
        <div class="text-center text-[#555] text-sm py-10">
          <p>Send a message to start chatting</p>
          <p class="text-xs text-[#333] mt-1">Powered by CLEX API</p>
        </div>
      </div>
      <div class="chat-input-bar">
        <input
          id="chat-input"
          type="text"
          placeholder="Type a message..."
          onkeydown="if (event.key === 'Enter') sendMessage();"
        />
        <button onclick="sendMessage()" id="send-btn">
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
            />
          </svg>
        </button>
      </div>
    </div>

    <script src="models-data.js"></script>
    <script src="shared.js?v=4"></script>
    <script>
      // ═══════════════════════════════════════════════════════
      // MODEL CATALOG (backed by shared models-data.js)
      // ═══════════════════════════════════════════════════════

      const allModels = Array.isArray(window.CLEX_MODELS)
        ? window.CLEX_MODELS
        : [];

      const modelsGrid = document.getElementById("models-grid");
      const noResults = document.getElementById("no-results");
      const searchInput = document.getElementById("search-input");
      const categoryTabs = document.querySelectorAll(".category-tab");
      let activeCategory = "all";

      // Check for search param from homepage
      const urlParams = new URLSearchParams(window.location.search);
      const initialSearch = urlParams.get("search") || "";
      if (initialSearch) searchInput.value = initialSearch;

      function getTagClass(category) {
        const map = {
          text: "",
          code: "code",
          speech: "speech",
          safety: "safety",
          embedding: "embedding",
          vision: "",
        };
        return map[category] || "";
      }

      function getCategoryLabel(category) {
        const map = {
          text: "Text & Chat",
          code: "Code",
          speech: "Speech",
          safety: "Safety",
          embedding: "Embedding",
          vision: "Vision",
        };
        return map[category] || category;
      }

      function formatNumber(v) {
        return typeof v === "number" ? v.toLocaleString() : "Model-specific";
      }

      function getDisplayValue(displayValue, numericValue, fallback) {
        if (typeof displayValue === "string" && displayValue.trim()) {
          return displayValue;
        }
        if (typeof numericValue === "number") {
          return formatNumber(numericValue);
        }
        return fallback;
      }

      function getModelMetadata(m) {
        const params =
          m.params_display ||
          ((m.id || m.name).match(/(\d+(?:\.\d+)?[bm])/i)?.[0]?.toUpperCase() ??
            "Specialized");
        const ctx = getDisplayValue(
          m.context_display,
          m.context_window,
          "Model-specific",
        );
        const maxOut = getDisplayValue(
          m.max_output_display,
          m.max_output_tokens,
          "Model-specific",
        );
        const price =
          m.pricing_display ||
          (m.input_cost != null || m.output_cost != null
            ? `$${m.input_cost ?? "?"} / $${m.output_cost ?? "?"} per 1M`
            : "See provider docs");
        const cutoff = m.cutoff_display || m.knowledge_cutoff || "Provider specific";
        return { params, ctx, maxOut, price, cutoff };
      }

      function renderModels() {
        const query = searchInput.value.toLowerCase().trim();
        const filtered = allModels.filter((m) => {
          const matchCategory =
            activeCategory === "all" || m.category === activeCategory;
          const matchSearch =
            !query ||
            (m.id || "").toLowerCase().includes(query) ||
            (m.name || "").toLowerCase().includes(query) ||
            (m.provider || m.publisher || "").toLowerCase().includes(query) ||
            (m.description || m.use || "").toLowerCase().includes(query);
          return matchCategory && matchSearch;
        });

        document.getElementById("model-count-badge").textContent =
          `${filtered.length} model${filtered.length !== 1 ? "s" : ""}`;

        if (filtered.length === 0) {
          modelsGrid.innerHTML = "";
          noResults.classList.remove("hidden");
          return;
        }
        noResults.classList.add("hidden");

        modelsGrid.innerHTML = filtered
          .map((m) => {
            const provider = m.provider || m.publisher || "Unknown";
            const modelId = m.id || m.nvidiaId || m.name;
            const modelDescription = m.description || m.use || "Model-specific";
            const modelLabel = m.name || modelId;
            const logo = getProviderLogo(provider);
            const tagClass = getTagClass(m.category);
            const catLabel = getCategoryLabel(m.category);
            const capabilities = Array.isArray(m.capabilities)
              ? m.capabilities
              : [];
            const isChat =
              (capabilities.includes("text") ||
                ["text", "code", "vision"].includes(m.category)) &&
              !["embedding", "speech", "safety"].includes(m.category) &&
              !m.comingSoon;
            const meta = getModelMetadata(m);

            return `
            <div class="model-card flex flex-col h-full" style="cursor:default;overflow:visible" data-model="${modelId}" data-provider="${provider}">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2.5">
                        <div class="w-8 h-8 rounded-lg flex items-center justify-center scale-[0.8]" title="${provider}">
                            ${logo.iconHTML}
                        </div>
                        <span class="text-xs font-medium text-[#555]">${provider}</span>
                    </div>
                    <span class="tag-badge ${tagClass}" title="Model Category: ${catLabel}">${catLabel}</span>
                </div>
                <h3 class="text-sm font-semibold text-white mb-1 leading-snug break-all" title="${modelId}">${modelId}</h3>
                <p class="text-[11px] text-[#555] mb-2 break-all">${modelLabel}</p>
                <p class="text-xs text-[#888] mb-3 leading-relaxed flex-grow">${modelDescription}</p>
                
                <div class="grid grid-cols-2 gap-2 mt-auto mb-4 text-[10px]">
                    <div class="flex justify-between items-center bg-white/[0.02] p-1.5 rounded border border-white/[0.04] hover:border-white/[0.08] transition-colors">
                        <span class="text-[#555] font-medium">Params</span>
                        <span class="text-white font-mono">${meta.params}</span>
                    </div>
                    <div class="flex justify-between items-center bg-white/[0.02] p-1.5 rounded border border-white/[0.04] hover:border-white/[0.08] transition-colors">
                        <span class="text-[#555] font-medium">Context</span>
                        <span class="text-white font-mono">${meta.ctx}</span>
                    </div>
                    <div class="flex justify-between items-center bg-white/[0.02] p-1.5 rounded border border-white/[0.04] hover:border-white/[0.08] transition-colors">
                        <span class="text-[#555] font-medium">Max Out</span>
                        <span class="text-white font-mono">${meta.maxOut}</span>
                    </div>
                    <div class="flex justify-between items-center bg-white/[0.02] p-1.5 rounded border border-white/[0.04] hover:border-white/[0.08] transition-colors">
                        <span class="text-[#555] font-medium">Cost/1M</span>
                        <span class="text-[#c9a96e] font-mono">${meta.price}</span>
                    </div>
                    <div class="col-span-2 flex justify-between items-center bg-white/[0.02] p-1.5 rounded border border-white/[0.04] hover:border-white/[0.08] transition-colors">
                        <span class="text-[#555] font-medium">Cutoff</span>
                        <span class="text-white font-mono">${meta.cutoff}</span>
                    </div>
                </div>
                
                ${
                  isChat
                    ? `
                <button class="try-btn w-full bg-white/[0.03] backdrop-blur-md border border-white/[0.06] text-[#c9a96e] py-2 rounded-lg text-xs font-semibold hover:bg-white/[0.06] hover:border-[#c9a96e]/30 hover:shadow-[0_0_15px_rgba(201,169,110,0.1)] transition-all focus:outline-none"
                    onclick="openChat('${modelId}', '${provider}')" aria-label="Try ${modelId}">
                    Try it
                </button>`
                    : `
                <div class="try-btn text-xs text-[#555] text-center py-2 font-medium bg-white/[0.02] rounded-lg border border-white/[0.04]" aria-label="${modelId} is a specialized model">Use specialized endpoint</div>
                `
                }
            </div>
            `;
          })
          .join("");
      }

      // Category tabs
      categoryTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          categoryTabs.forEach((t) => t.classList.remove("active"));
          tab.classList.add("active");
          activeCategory = tab.dataset.category;
          renderModels();
        });
      });

      // Search
      searchInput.addEventListener("input", renderModels);

      // Initial render
      renderModels();

      // ═══════════════════════════════════════════════════════
      // CHAT PANEL
      // ═══════════════════════════════════════════════════════
      let chatModelId = "";
      let chatHistory = [];

      function openChat(modelId, provider) {
        chatModelId = modelId;
        chatHistory = [];
        document.getElementById("chat-model-name").textContent = modelId;
        document.getElementById("chat-model-publisher").textContent = provider;
        document.getElementById("chat-messages").innerHTML = `
            <div class="text-center text-gray-600 text-sm py-10">
                <p>Send a message to start chatting with <span class="text-[#c9a96e] font-medium">${modelId}</span></p>
                <p class="text-xs text-gray-700 mt-1">Powered by CLEX API</p>
            </div>
        `;
        document.getElementById("chat-panel").classList.add("open");
        document.getElementById("chat-overlay").classList.remove("hidden");
        document.getElementById("chat-input").focus();
      }

      function closeChat() {
        document.getElementById("chat-panel").classList.remove("open");
        document.getElementById("chat-overlay").classList.add("hidden");
      }

      async function sendMessage() {
        const inputEl = document.getElementById("chat-input");
        const messagesEl = document.getElementById("chat-messages");
        const text = inputEl.value.trim();
        if (!text) return;

        if (!localStorage.getItem("clex_logged_in")) {
          messagesEl.innerHTML += `<div class="chat-bubble assistant text-amber-400 bg-amber-400/10 border border-amber-400/20">Authentication required: Please <a href="login.html" class="text-white underline hover:text-amber-300 font-bold">Sign In</a> to test this model.</div>`;
          messagesEl.scrollTop = messagesEl.scrollHeight;
          inputEl.value = "";
          return;
        }
        inputEl.value = "";

        // Clear welcome message
        if (chatHistory.length === 0) {
          messagesEl.innerHTML = "";
        }

        // Add user bubble
        chatHistory.push({ role: "user", content: text });
        messagesEl.innerHTML += `<div class="chat-bubble user">${escapeHtml(text)}</div>`;

        // Add typing indicator
        const typingId = "typing-" + Date.now();
        messagesEl.innerHTML += `
            <div id="${typingId}" class="chat-bubble assistant flex items-center gap-2">
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
                <span class="typing-dot"></span>
            </div>
        `;
        messagesEl.scrollTop = messagesEl.scrollHeight;

        try {
          const res = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: chatModelId,
              messages: chatHistory,
            }),
          });

          const typing = document.getElementById(typingId);
          if (typing) typing.remove();

          if (!res.ok) {
            const errData = await res.json().catch(() => ({}));
            const errMsg =
              errData.error || `Error ${res.status}: Could not get response`;
            messagesEl.innerHTML += `<div class="chat-bubble assistant text-red-400">${escapeHtml(errMsg)}</div>`;
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return;
          }

          // Handle streaming response
          let assistantMsg = "";

          const bubbleEl = document.createElement("div");
          bubbleEl.className = "chat-bubble assistant";
          messagesEl.appendChild(bubbleEl);

          await window.clex.streamChatCompletionsSSE(res, {
            onToken: (token) => {
              assistantMsg += token;
              bubbleEl.textContent = assistantMsg;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            },
            onError: (e, raw) => {
              console.error("SSE parser error on chunk:", raw, e);
            },
          });

          if (assistantMsg) {
            chatHistory.push({ role: "assistant", content: assistantMsg });
          }
        } catch (err) {
          const typing = document.getElementById(typingId);
          if (typing) typing.remove();
          messagesEl.innerHTML += `<div class="chat-bubble assistant text-red-400">Network error. Make sure you can reach api.clex.in.</div>`;
        }

        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function escapeHtml(s) {
        const div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      // Guard: shared.js?v=4 should define `window.clex.streamChatCompletionsSSE`
      if (!window.clex || !window.clex.streamChatCompletionsSSE) {
        console.warn(
          "Streaming helper not found. Make sure shared.js?v=4 is loaded.",
        );
      }
    </script>
  </body>
</html>
