<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground — Clex AI</title>
    <meta
      name="description"
      content="The Clex AI IDE. Multi-file project + AI assistant in your browser."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="shared.css" />
    <link rel="stylesheet" href="playground.css?v=3" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <meta property="og:title" content="Playground — Clex AI" />
    <meta
      property="og:description"
      content="The Clex AI IDE. Multi-file project + AI assistant in your browser."
    />
    <meta property="og:image" content="https://clex.in/preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Playground — Clex AI" />
    <meta
      name="twitter:description"
      content="The Clex AI IDE. Multi-file project + AI assistant in your browser."
    />
    <meta name="twitter:image" content="https://clex.in/preview.png" />
  </head>

  <body class="ide-body">
    <canvas id="particle-canvas"></canvas>

    <div class="ide-shell">
      <div data-clex-header data-page="playground"></div>

      <!-- ─────────────── Toolbar ─────────────── -->
      <header class="ide-toolbar">
        <div class="ide-toolbar-left">
          <span class="ide-eyebrow">Clex AI</span>
          <span class="ide-title">
            <span class="ide-title-italic">IDE</span>
          </span>
          <span class="ide-status" id="ide-status" data-state="idle">
            <span class="ide-status-dot"></span>
            <span class="ide-status-label">Idle</span>
          </span>
        </div>

        <div class="ide-toolbar-center">
          <label class="ide-field">
            <span class="ide-field-label">Template</span>
            <select id="template-select" class="ide-select">
              <option value="static">Static (HTML/CSS/JS)</option>
              <option value="vite-react">Vite + React</option>
              <option value="vue">Vite + Vue</option>
              <option value="svelte">Vite + Svelte</option>
              <option value="typescript">TypeScript</option>
            </select>
          </label>

          <label class="ide-field ide-field--wide">
            <span class="ide-field-label">Model</span>
            <input
              id="model-input"
              list="model-options"
              class="ide-input"
              placeholder="moonshotai/kimi-k2-instruct"
            />
            <datalist id="model-options"></datalist>
            <span class="ide-field-hint" id="model-credit-hint">— credits</span>
          </label>

          <label class="ide-field">
            <span class="ide-field-label">API key (optional)</span>
            <input
              id="clex-api-key"
              type="password"
              class="ide-input ide-input--mono"
              placeholder="clex_…"
              autocomplete="off"
            />
          </label>
        </div>

        <div class="ide-toolbar-right">
          <button id="boot-btn" class="ide-btn ide-btn--gold">
            <span class="ide-btn-dot"></span> Boot sandbox
          </button>
          <button id="install-btn" class="ide-btn" disabled>npm install</button>
          <button id="run-btn" class="ide-btn" disabled>npm run dev</button>
          <button
            id="save-btn"
            class="ide-btn ide-btn--ghost"
            disabled
            title="Save (⌘S)"
          >
            Save
          </button>
        </div>
      </header>

      <!-- ─────────────── Main grid ─────────────── -->
      <main class="ide-grid" id="ide-grid">
        <!-- Files panel -->
        <aside class="ide-pane ide-pane--files" data-pane="files">
          <header class="ide-pane-header">
            <span class="ide-pane-title">Files</span>
            <div class="ide-pane-actions">
              <button
                id="new-file-btn"
                class="ide-icon-btn"
                title="New file"
                disabled
              >
                +
              </button>
              <button
                id="del-file-btn"
                class="ide-icon-btn"
                title="Delete active file"
                disabled
              >
                ✕
              </button>
            </div>
          </header>
          <div id="file-tree" class="ide-file-tree" role="tree">
            <p class="ide-empty">Boot the sandbox to load files.</p>
          </div>
        </aside>

        <!-- Editor pane -->
        <section class="ide-pane ide-pane--editor" data-pane="editor">
          <header class="ide-pane-header ide-pane-header--tabs">
            <div id="editor-tabs" class="ide-tabs" role="tablist"></div>
            <div class="ide-pane-actions">
              <span class="ide-shortcut">⌘S</span>
              <button
                id="format-btn"
                class="ide-icon-btn"
                title="Reset file from template"
                disabled
              >
                ↺
              </button>
            </div>
          </header>
          <div id="editor" class="ide-editor"></div>
        </section>

        <!-- AI chat pane -->
        <section class="ide-pane ide-pane--chat" data-pane="chat">
          <header class="ide-pane-header">
            <span class="ide-pane-title">
              <span class="ide-dot ide-dot--gold"></span> AI Assistant
            </span>
            <div class="ide-pane-actions">
              <button
                id="chat-clear"
                class="ide-icon-btn"
                title="Clear chat"
              >
                ⌫
              </button>
            </div>
          </header>

          <div id="chat-thread" class="ide-chat-thread">
            <div class="ide-chat-empty">
              <p class="ide-chat-empty-line">
                Ask the model to scaffold or change files.
              </p>
              <p class="ide-chat-empty-hint">
                Code blocks tagged
                <code>```lang file=path/to/file</code>
                show an Apply button.
              </p>
            </div>
          </div>

          <div class="ide-chat-suggest" id="chat-suggest">
            <button class="ide-chip" data-prompt="Add a dark / light mode toggle to this project.">
              Theme toggle
            </button>
            <button class="ide-chip" data-prompt="Refactor the active file into smaller components.">
              Refactor
            </button>
            <button class="ide-chip" data-prompt="Add a contact form with client-side validation.">
              Contact form
            </button>
            <button class="ide-chip" data-prompt="Explain what the active file does, line by line.">
              Explain
            </button>
            <button class="ide-chip" data-prompt="Write tests for the active file using vitest.">
              Tests
            </button>
          </div>

          <form id="chat-form" class="ide-chat-form" autocomplete="off">
            <textarea
              id="chat-input"
              class="ide-chat-input"
              rows="2"
              placeholder="Ask the model — it sees the active file and can edit any file in the tree."
            ></textarea>
            <div class="ide-chat-form-actions">
              <span class="ide-chat-form-hint" id="chat-context-hint">
                Context: active file + open tabs
              </span>
              <button
                type="submit"
                id="chat-send"
                class="ide-btn ide-btn--gold ide-btn--small"
                disabled
              >
                Send
              </button>
            </div>
          </form>
        </section>
      </main>

      <!-- ─────────────── Bottom dock ─────────────── -->
      <footer class="ide-dock">
        <div class="ide-dock-tabs" role="tablist">
          <button
            class="ide-dock-tab active"
            data-dock="preview"
            role="tab"
            aria-selected="true"
          >
            Preview
            <span class="ide-dock-url" id="preview-url">(not running)</span>
          </button>
          <button class="ide-dock-tab" data-dock="console" role="tab">
            Console
          </button>
        </div>
        <div class="ide-dock-actions">
          <div class="ide-dock-devices">
            <button class="ide-chip ide-chip--device active" data-device="desktop">
              Desktop
            </button>
            <button class="ide-chip ide-chip--device" data-device="tablet">
              Tablet
            </button>
            <button class="ide-chip ide-chip--device" data-device="mobile">
              Mobile
            </button>
          </div>
          <button id="refresh-preview" class="ide-icon-btn" title="Refresh">
            ⟳
          </button>
          <button id="open-preview-tab" class="ide-icon-btn" title="Open in new tab">
            ↗
          </button>
          <button id="dock-collapse" class="ide-icon-btn" title="Collapse panel">
            ▾
          </button>
        </div>

        <div class="ide-dock-body" data-dock-body="preview">
          <div id="preview-frame-wrap" class="ide-preview-wrap">
            <iframe
              id="preview-frame"
              title="Live preview"
              class="ide-preview-iframe"
              src="about:blank"
            ></iframe>
          </div>
        </div>
        <div class="ide-dock-body hidden" data-dock-body="console">
          <pre id="logs" class="ide-logs">Boot the sandbox to see logs…</pre>
          <button id="clear-logs" class="ide-chip ide-chip--logs">Clear</button>
        </div>
      </footer>

      <div data-clex-footer></div>
    </div>

    <script src="models-data.js?v=2"></script>
    <script src="shared.js?v=8"></script>
    <script type="module" src="playground.js?v=2"></script>
  </body>
</html>
