    <script src="models-data.js?v=2"></script>
    <script src="shared.js?v=8"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        signInWithPopup,
        GoogleAuthProvider,
        GithubAuthProvider,
        sendSignInLinkToEmail,
        isSignInWithEmailLink,
        signInWithEmailLink,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyCkq2q4kxUyY-Cj2YTNXweI7ckzIx7eots",
        authDomain: "clex-in.firebaseapp.com",
        projectId: "clex-in",
        storageBucket: "clex-in.firebasestorage.app",
        messagingSenderId: "1050016400675",
        appId: "1:1050016400675:web:32eaedd53bc82d2663f896",
        measurementId: "G-P5RC17ZCY2",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Providers
      const googleProvider = new GoogleAuthProvider();
      const githubProvider = new GithubAuthProvider();

      // Switch Tabs Logic
      window.switchTab = function (tab) {
        const signinTab = document.getElementById("tab-signin");
        const signupTab = document.getElementById("tab-signup");
        const signinForm = document.getElementById("form-signin");
        const signupForm = document.getElementById("form-signup");

        if (tab === "signin") {
          signinTab.classList.add("bg-white/[0.06]", "text-white");
          signinTab.classList.remove("text-[#555]");
          signupTab.classList.remove("bg-white/[0.06]", "text-white");
          signupTab.classList.add("text-[#555]");
          signinForm.classList.remove("hidden");
          signupForm.classList.add("hidden");
        } else {
          signupTab.classList.add("bg-white/[0.06]", "text-white");
          signupTab.classList.remove("text-[#555]");
          signinTab.classList.remove("bg-white/[0.06]", "text-white");
          signinTab.classList.add("text-[#555]");
          signupForm.classList.remove("hidden");
          signinForm.classList.add("hidden");
        }
      };

      const showError = (error) => {
        alert(error.message);
        console.error(error);
      };

      const proceedToDashboard = () => {
        localStorage.setItem("clex_logged_in", "true");
        window.location.href = "/dashboard/";
      };

      // --- Handlers ---
      window.handleSignIn = async function (e) {
        e.preventDefault();
        const email = e.target.querySelector('input[type="email"]').value;
        const password = e.target.querySelector('input[type="password"]').value;

        try {
          await signInWithEmailAndPassword(auth, email, password);
          proceedToDashboard();
        } catch (error) {
          showError(error);
        }
      };

      window.handleSignUp = async function (e) {
        e.preventDefault();
        const email = e.target.querySelector('input[type="email"]').value;
        const password = e.target.querySelector('input[type="password"]').value;

        try {
          await createUserWithEmailAndPassword(auth, email, password);
          proceedToDashboard();
        } catch (error) {
          showError(error);
        }
      };

      window.signInWithGoogle = async function () {
        try {
          await signInWithPopup(auth, googleProvider);
          proceedToDashboard();
        } catch (error) {
          showError(error);
        }
      };

      window.signInWithGithub = async function () {
        try {
          await signInWithPopup(auth, githubProvider);
          proceedToDashboard();
        } catch (error) {
          showError(error);
        }
      };

      window.resetPassword = async function (e) {
        e.preventDefault();
        const email = document.querySelector(
          '#form-signin input[type="email"]',
        ).value;
        if (!email) {
          alert("Please enter your email address first");
          return;
        }
        try {
          await sendPasswordResetEmail(auth, email);
          alert("Password reset email sent!");
        } catch (error) {
          showError(error);
        }
      };

      window.sendPasswordlessLink = async function (e) {
        e.preventDefault();
        const email = document.querySelector(
          '#form-signin input[type="email"]',
        ).value;
        if (!email) {
          alert("Please enter your email address first");
          return;
        }

        const actionCodeSettings = {
          url: window.location.origin + "/login.html",
          handleCodeInApp: true,
        };
        // After verification we always land back here, then redirect to /dashboard/.

        try {
          await sendSignInLinkToEmail(auth, email, actionCodeSettings);
          window.localStorage.setItem("emailForSignIn", email);
          alert("Sign-in link sent to your email!");
        } catch (error) {
          showError(error);
        }
      };

      // --- Check for Passwordless Link on Load ---
      if (isSignInWithEmailLink(auth, window.location.href)) {
        let email = window.localStorage.getItem("emailForSignIn");
        if (!email) {
          email = window.prompt("Please provide your email for confirmation");
        }
        signInWithEmailLink(auth, email, window.location.href)
          .then((result) => {
            window.localStorage.removeItem("emailForSignIn");
            proceedToDashboard();
          })
          .catch((error) => {
            showError(error);
          });
      }
    </script>
  </body>
</html>
